services:
  app:
    build: .
    container_name: ss-laravel-school-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - /var/www/html/vendor
    networks:
      - ss_laravel_school_network
    depends_on:
      - mysql

  nginx:
    image: nginx:alpine
    container_name: ss-laravel-school-nginx
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - ss_laravel_school_network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: ss-laravel-school-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ss_laravel_school
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: ss_laravel_school_user
      MYSQL_PASSWORD: myPassword!school
    volumes:
      - ss_laravel_school_data:/var/lib/mysql
    networks:
      - ss_laravel_school_network

volumes:
  ss_laravel_school_data:

networks:
  ss_laravel_school_network:
    driver: bridge